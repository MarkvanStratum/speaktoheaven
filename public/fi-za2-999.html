<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Secure Checkout</title>

<meta name="referrer" content="no-referrer">

<script src="https://api.goaffpro.com/loader.js?shop=nzyvwvfbde"></script>

<script type="text/javascript" src="https://gw.finby.eu/js/v1.js"></script>

<style>
:root{--bg:#fafafa;--text:#0a2540;--muted:#5b6b82;--line:#e5e7eb;}
*{box-sizing:border-box}
html,body{height:100%}
body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Inter,system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
}

.safe{
background:#0a0a0a;
color:#fff;
font-size:12px;
padding:6px 10px;
}

.wrap{
max-width:1100px;
margin:0 auto;
padding:18px 14px 60px;
}

.page-title{
font-size:28px;
font-weight:900;
display:flex;
align-items:center;
gap:8px;
margin:6px 0 14px;
}

.stars{color:#f6b80c}
.reviews{color:#5b6b82;font-size:13px}

.grid{
display:grid;
grid-template-columns:minmax(0,1fr) 360px;
gap:18px;
}

@media(max-width:980px){
.grid{grid-template-columns:1fr}
}
