<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Speak to Heaven — Biblical AI Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-heaven: #fdfcfb; 
      --marble: #ffffff;
      --gold-divine: #c5a059;
      --blue-saint: #2c3e50;
      --text-main: #33302c;
      --text-muted: #8a8276;
      --border-holy: rgba(197, 160, 89, 0.25);
      --radius: 12px;
      --divine-shadow: 0 15px 50px rgba(0,0,0,0.04);
    }

    * { box-sizing: border-box; }
    body { margin: 0; color: var(--text-main); background-color: var(--bg-heaven); font-family: "EB Garamond", serif; font-size: 19px; line-height: 1.7; }
    .wrap { max-width: 1200px; margin: 0 auto; padding: 0px 20px 40px; }
    body.logged-in .wrap { max-width: none; width: 100%; padding: 0 10px 20px; }

    header { display: flex; align-items: center; justify-content: space-between; padding: 20px 0; border-bottom: 1px solid var(--border-holy); margin-bottom: 40px; }
    .brand { display: flex; align-items: center; gap: 15px; }
    .logo { width: 50px; height: 50px; background: white; border: 1.5px solid var(--gold-divine); border-radius: 50%; display: grid; place-items: center; font-family: "Cinzel", serif; color: var(--gold-divine); font-size: 22px; }
    
    .grid { display: grid; grid-template-columns: 1fr 1.3fr; gap: 40px; }
    body.logged-in .grid { grid-template-columns: 1fr; gap: 0; }

    .card { background: var(--marble); border: 1px solid var(--border-holy); border-radius: var(--radius); box-shadow: var(--divine-shadow); overflow: hidden; }
    .tabs { display: flex; background: #f8f8f8; cursor: pointer; border-bottom: 1px solid var(--border-holy); }
    .tab { flex: 1; padding: 15px; text-align: center; font-family: "Cinzel", serif; color: var(--text-muted); font-size: 14px; }
    .tab.active { background: white; color: var(--gold-divine); border-top: 2px solid var(--gold-divine); }

    input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; font-family: inherit; font-size: 16px; }
    .btn { padding: 14px 28px; border-radius: 6px; font-family: "Cinzel", serif; cursor: pointer; border: 1px solid var(--gold-divine); background: transparent; color: var(--gold-divine); text-transform: uppercase; letter-spacing: 1px; width: 100%; }
    .btn.primary { background: var(--gold-divine); color: white; border: none; }

    .chat-shell { display: grid; grid-template-columns: 280px minmax(0, 1fr); height: 600px; }
    body.logged-in .chat-shell { height: calc(100vh - 200px); }
    .sidebar { background: #faf9f7; border-right: 1px solid var(--border-holy); padding: 15px; overflow-y: auto; }
    
    .pitem { display: flex; align-items: center; padding: 15px; margin-bottom: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; background: white; font-family: "Cinzel", serif; font-size: 16px; }
    .pitem.active { border-color: var(--gold-divine); background: #fffdf9; color: var(--gold-divine); }
    
    .chat-log { padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: scroll; height: 100%; background: #fff; scroll-behavior: smooth; }
    .bubble { padding: 14px 18px; border-radius: 18px; max-width: 85%; font-size: 17px; word-wrap: break-word; }
    .bubble.them { background: #f8f6f2; align-self: flex-start; }
    .bubble.me { background: var(--blue-saint); color: white; align-self: flex-end; }
    .hide { display: none !important; }

    footer { margin-top: 40px; padding: 30px 20px; border-top: 1px solid var(--border-holy); text-align: center; }
    .footer-links { margin-bottom: 20px; }
    .footer-links a { color: var(--text-muted); text-decoration: none; margin: 0 15px; font-size: 15px; font-family: "EB Garamond", serif; }
    .footer-links a:hover { color: var(--gold-divine); }
    .payment-icons { display: flex; justify-content: center; gap: 15px; align-items: center; opacity: 0.7; }
    .payment-icons img { height: 24px; filter: grayscale(1); }
  </style>
</head>

<body>
  <div class="wrap">
    <header>
      <div class="brand"><div class="logo">S</div><h1>Speak to Heaven</h1></div>
      <button class="btn" id="logoutBtn" style="display:none; width: auto;">Exit</button>
    </header>

    <div class="grid">
      <div class="stack" id="authSection">
        <div class="card" style="margin-bottom: 30px;">
          <div class="tabs"><div class="tab active" id="tabLogin">Sign In</div><div class="tab" id="tabRegister">New Account</div></div>
          <div style="padding: 30px;">
            <div id="loginPane"><input id="loginEmail" type="email" placeholder="Email"><input id="loginPassword" type="password" placeholder="Password"><button class="btn primary" id="loginBtn">Enter</button></div>
            <div id="registerPane" class="hide"><input id="regEmail" type="email" placeholder="Email"><input id="regPassword" type="password" placeholder="Password"><button class="btn primary" id="registerBtn">Create Account</button></div>
          </div>
        </div>
      </div>

      <div class="card" id="chatCard">
        <div class="chat-shell">
          <div class="sidebar" id="profiles"></div>
          <div style="display: flex; flex-direction: column; height: 100%;">
            <div style="padding: 20px; border-bottom: 1px solid var(--border-holy); font-family: Cinzel;" id="chatTitle">Select a Character</div>
            <div class="chat-log" id="chatLog"></div>
            <div style="padding: 20px; border-top: 1px solid var(--border-holy); display: flex; gap: 12px; background: white;">
              <textarea id="chatInput" placeholder="Write your message..." disabled style="flex:1; height: 60px; resize: none;"></textarea>
              <button class="btn primary" id="sendBtn" disabled style="width: auto;">Send</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer>
      <div class="footer-links">
        <a href="/contact">Contact</a>
        <a href="/terms">Terms & Conditions</a>
        <a href="/privacy-policy">Privacy Policy</a>
        <a href="/refund-policy">Refund Policy</a>
      </div>
      <div class="payment-icons">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
        <img src="https://upload.wikimedia.org/wikipedia/commons/2/2a/Mastercard-logo.svg" alt="Mastercard">
      </div>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    let selectedId = null;

    function getToken() { return localStorage.getItem("jwt"); }

    async function sendMessage() {
      const text = $("chatInput").value.trim();
      if (!text || !selectedId) return;
      appendMessage("me", text);
      $("chatInput").value = "";
      const res = await fetch("/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${getToken()}` },
        body: JSON.stringify({ characterId: selectedId, message: text })
      });
      if (res.status === 403) { alert("Limit Reached."); return; }
      const data = await res.json();
      if (data.reply) appendMessage("them", data.reply);
    }

    function appendMessage(side, text) {
      const div = document.createElement("div");
      div.className = `bubble ${side}`;
      div.innerText = text;
      const log = $("chatLog");
      log.appendChild(div);
      setTimeout(() => { log.scrollTop = log.scrollHeight; }, 50);
    }

    async function loadProfiles() {
      const res = await fetch("/api/profiles");
      const profiles = await res.json();
      profiles.forEach(p => {
        const div = document.createElement("div");
        div.className = "pitem"; 
        div.innerHTML = `<span>${p.name}</span>`;
        div.onclick = () => {
          document.querySelectorAll(".pitem").forEach(i => i.classList.remove("active"));
          div.classList.add("active");
          selectedId = p.id;
          $("chatTitle").innerText = p.name;
          $("chatLog").innerHTML = `<div class="bubble them">I am ${p.name}. How can I guide you?</div>`;
          if (getToken()) { $("chatInput").disabled = false; $("sendBtn").disabled = false; $("chatInput").focus(); }
        };
        $("profiles").appendChild(div);
      });
    }

    $("logoutBtn").onclick = () => { localStorage.removeItem("jwt"); location.reload(); };
    $("sendBtn").onclick = sendMessage;
    $("chatInput").onkeypress = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

    $("loginBtn").onclick = async () => {
      const res = await fetch("/api/login", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email: $("loginEmail").value, password: $("loginPassword").value }) });
      if (res.ok) { const d = await res.json(); localStorage.setItem("jwt", d.token); location.reload(); } else { alert("Login failed."); }
    };

    $("registerBtn").onclick = async () => {
      const res = await fetch("/api/register", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ email: $("regEmail").value, password: $("regPassword").value }) });
      if (res.ok) { alert("Success. Please sign in."); $("tabLogin").click(); }
    };

    $("tabLogin").onclick = () => { $("tabLogin").className="tab active"; $("tabRegister").className="tab"; $("loginPane").classList.remove("hide"); $("registerPane").classList.add("hide"); };
    $("tabRegister").onclick = () => { $("tabRegister").className="tab active"; $("tabLogin").className="tab"; $("registerPane").classList.remove("hide"); $("loginPane").classList.add("hide"); };

    if (getToken()) { document.body.classList.add("logged-in"); $("authSection").classList.add("hide"); $("logoutBtn").style.display = "block"; }
    loadProfiles();
  </script>
</body>
</html>
