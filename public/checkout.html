<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacred Offering — Secure Checkout</title>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=EB+Garamond&display=swap" rel="stylesheet">
    <script type="text/javascript" src="https://gw.finby.eu/js/v1.js"></script>

    <style>
        :root {
            --gold-divine: #c5a059;
            --blue-saint: #2c3e50;
            --bg-heaven: #fdfcfb;
            --text-muted: #8a8276;
            --text-main: #33302c;
            --error: #b00020;
            --success: #1b7f3a;
        }
        body { background: var(--bg-heaven); font-family: 'EB Garamond', serif; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; overflow-y: auto; margin: 0; padding: 20px; box-sizing: border-box; }
        .checkout-box {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 50px rgba(44, 62, 80, 0.05);
            border: 1px solid rgba(197, 160, 89, 0.2);
            width: 100%;
            max-width: 480px;
            margin: 40px 0;
            text-align: center;
        }
        h2 { font-family: 'Cinzel', serif; color: var(--blue-saint); margin-bottom: 10px; font-weight: 400; letter-spacing: 2px; }
        .subtitle { color: var(--gold-divine); font-style: italic; margin-bottom: 30px; font-size: 16px; }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 6px; color: var(--blue-saint); font-family: 'Cinzel', serif; font-size: 12px; letter-spacing: 1px; }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 6px;
            font-family: 'EB Garamond', serif;
            font-size: 16px;
            color: var(--text-main);
            background: #fff;
            box-sizing: border-box;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--gold-divine); }

        #card-element {
            padding: 14px;
            border: 1px solid rgba(197, 160, 89, 0.3);
            border-radius: 6px;
            background: #fff;
            min-height: 44px;
            margin-top: 4px;
        }

        .btn-submit {
            background: var(--blue-saint);
            color: white;
            border: none;
            width: 100%;
            padding: 14px;
            font-family: 'Cinzel', serif;
            font-size: 14px;
            letter-spacing: 2px;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 30px;
            transition: background 0.2s;
        }
        .btn-submit:hover { background: var(--gold-divine); }
        .btn-submit:disabled { background: #cbd5e1; cursor: not-allowed; color: #64748b; }

        .message { margin-top: 20px; padding: 12px; border-radius: 6px; font-size: 16px; display: none; }
        .message.error { display: block; background: #fdf2f2; color: var(--error); border: 1px solid #fecdcd; }
        .message.success { display: block; background: #f0fdf4; color: var(--success); border: 1px solid #bbf7d0; }

        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="checkout-box">
    <h2>Secure Communion</h2>
    <div class="subtitle">Provide your offering details to unlock access</div>

    <form id="payment-form">
        <div class="input-group">
            <label for="cardholder-name">Cardholder Name</label>
            <input type="text" id="cardholder-name" placeholder="John Doe" required>
        </div>

        <div class="input-group">
            <label>Card Information</label>
            <div id="card-element"></div>
        </div>

        <div id="message-box" class="message"></div>

        <button type="submit" id="submit-button" class="btn-submit">
            <span id="btn-loader" style="display: none;" class="loader"></span>
            <span id="btn-text">Complete Offering</span>
        </button>
    </form>
</div>

<script>
const tokenFromServer = window.PROMO_CHECKOUT_TOKEN || null;

const form = document.getElementById('payment-form');
const submitBtn = document.getElementById('submit-button');
const btnLoader = document.getElementById('btn-loader');
const btnText = document.getElementById('btn-text');
const messageBox = document.getElementById('message-box');

let trustPayApi = null;
let cardComponent = null;
let paymentSecrets = null;

function setLoading(isLoading) {
    if (isLoading) {
        submitBtn.disabled = true;
        btnLoader.style.display = 'inline-block';
        btnText.textContent = 'Processing...';
    } else {
        submitBtn.disabled = false;
        btnLoader.style.display = 'none';
        btnText.textContent = 'Complete Offering';
    }
}

function showMessage(type, text) {
    messageBox.textContent = text;
    messageBox.className = `message ${type}`;
}

async function initialiseFinby() {
    if (!tokenFromServer) {
        throw new Error('Invalid or expired checkout session. Please re-select a plan.');
    }

    // Routed through your protected promotion execution workspace endpoint securely
    const response = await fetch("/api/create-promo-payment", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            checkoutToken: tokenFromServer
        })
    });

    const text = await response.text();
    let data;
    try {
        data = JSON.parse(text);
    } catch (e) {
        throw new Error(text || 'Server returned an invalid response environment.');
    }

    if (!response.ok) {
        throw new Error(data.error || 'Could not instantiate payment record.');
    }

    if (!data.secrets || !data.secrets.payment) {
        throw new Error('Handshake failed. No payment secret tokens were initialized.');
    }

    paymentSecrets = data.secrets;
    trustPayApi = new TrustPayApi(paymentSecrets);

    cardComponent = trustPayApi.createComponent("card", {
        style: {
            fontFamily: "'EB Garamond', serif",
            fontSize: "16px",
            color: "#33302c"
        }
    });

    document.getElementById("card-element").innerHTML = "";
    cardComponent.mount("#card-element");
}

window.addEventListener('load', async () => {
    try {
        setLoading(true);
        await initialiseFinby();
    } catch (error) {
        console.error(error);
        showMessage('error', error.message || 'Could not load payment form.');
    } finally {
        setLoading(false);
    }
});

form.addEventListener('submit', async (event) => {
    event.preventDefault();
    messageBox.className = 'message';

    if (!form.checkValidity()) {
        form.reportValidity();
        return;
    }

    try {
        setLoading(true);

        if (!trustPayApi || !cardComponent || !paymentSecrets) {
            await initialiseFinby();
        }

        const result = await trustPayApi.finishCardPayment(paymentSecrets.payment, {
            card: cardComponent
        });

        console.log('FINBY PAYMENT RESULT:', result);

        const isFinbySuccess =
            result &&
            (
                result.status === "paid" ||
                result.status === "success" ||
                result.status === "succeeded" ||
                Number(result.status) === 0 ||
                Number(result.status) > 0 ||
                String(result.resultCode || result.ResultCode || "") === "100000" ||
                String(result.reasonCode || result.ReasonCode || "") === "000.000.000"
            );

        if (isFinbySuccess) {
            showMessage('success', 'Payment completed successfully. Your access will be activated shortly.');

            setTimeout(() => {
                window.location.href = '/login.html';
            }, 1800);
        } else {
            showMessage('error', 'Payment was not completed. Please check your card details or try another card.');
        }

    } catch (error) {
        console.error('Payment failed:', error);
        showMessage('error', error?.message || 'Transaction submission failed.');
    } finally {
        setLoading(false);
    }
});
</script>
</body>
</html>
